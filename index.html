<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Cross Pollination II — Lane 8</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* pulled from album cover */
    --bg:        #0d0a14;
    --bg-soft:   #14111c;
    --cream:     #F2EAB8;
    --pearl:     #A4D6C9;
    --vine:      #2F8F3F;
    --sky:       #5BA3D0;
    --coral:     #E55B4F;
    --sun:       #F08A3E;
    --ink:       #cfc89a;
    --muted:     rgba(242,234,184,0.55);
    --hairline:  rgba(242,234,184,0.18);
  }

  html, body {
    min-height: 100%;
    width: 100%;
    overflow-x: hidden;
    background: var(--bg);
    font-family: 'Montserrat', system-ui, sans-serif;
    color: var(--cream);
    -webkit-font-smoothing: antialiased;
  }

  body {
    overflow-y: auto;
  }

  /* ===== Pollen drift layer ===== */
  .pollen-layer {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .pollen {
    position: absolute;
    bottom: -20px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0;
    filter: blur(0.4px);
    will-change: transform, opacity;
    animation: pollenRise linear infinite;
  }
  @keyframes pollenRise {
    0%   { transform: translate3d(0, 0, 0) scale(0.6); opacity: 0; }
    8%   { opacity: var(--peak, 0.55); }
    50%  { transform: translate3d(var(--mx, 20px), -45vh, 0) scale(1); }
    92%  { opacity: var(--peak, 0.55); }
    100% { transform: translate3d(var(--ex, -10px), -110vh, 0) scale(0.5); opacity: 0; }
  }

  /* Riso grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    background-size: 220px;
    pointer-events: none;
    z-index: 100;
    opacity: 0.18;
    mix-blend-mode: overlay;
  }

  /* full-screen artwork — hidden until unlock */
  #bgArt {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.28);
    opacity: 0;
    transition: opacity 2.5s ease;
    z-index: 0;
    pointer-events: none;
  }

  #bgArt.visible { opacity: 1; }

  /* Two-view system: locked + unlocked */
  .view {
    position: absolute;
    inset: 0;
    z-index: 2;
    min-height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px 56px;
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .view.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.98);
  }
  .view.entering {
    opacity: 0;
    transform: scale(1.02);
  }

  .scene {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 20px 56px;
  }

  /* Header chrome */
  .header-row {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 28px;
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }
  .header-row .dot-mark {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--coral);
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 8px var(--coral);
    animation: pulseLive 2s ease-in-out infinite;
  }
  @keyframes pulseLive {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.7); }
  }

  /* Artwork */
  .artwork-wrap {
    position: relative;
    width: min(76vw, 360px);
    aspect-ratio: 1 / 1;
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow:
      0 0 0 1px rgba(242,234,184,0.08),
      0 30px 60px -20px rgba(0,0,0,0.7);
  }

  @keyframes drift {
    0%   { transform: scale(1.04) translate(0px,    0px);   }
    25%  { transform: scale(1.06) translate(-4px,  -3px);   }
    50%  { transform: scale(1.07) translate( 3px,  -4px);   }
    75%  { transform: scale(1.06) translate( 4px,   2px);   }
    100% { transform: scale(1.04) translate(0px,    0px);   }
  }

  .artwork-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    animation: drift 22s ease-in-out infinite;
    will-change: transform;
    filter: saturate(1) brightness(1);
    transition: filter 1.6s ease;
  }

  .artwork-wrap.unlocked .artwork-img {
    animation: drift 16s ease-in-out infinite, bloomPulse 2.4s ease-out;
    filter: saturate(1.18) brightness(1.08);
  }

  @keyframes bloomPulse {
    0%   { filter: saturate(0.6) brightness(0.55); }
    35%  { filter: saturate(1.5) brightness(1.4);  }
    100% { filter: saturate(1.18) brightness(1.08);}
  }

  /* Soft inner edge */
  .artwork-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 80px rgba(13,10,20,0.55);
    pointer-events: none;
    z-index: 5;
  }

  /* Leaflet map blended over artwork */
  #mapOverlay {
    position: absolute;
    inset: 0;
    z-index: 3;
    opacity: 0;
    transition: opacity 2.5s ease 1s;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  #mapOverlay.visible { opacity: 0.7; }
  #mapOverlay .leaflet-tile-pane { filter: saturate(0.6) brightness(0.85); }

  /* Bud-glow overlay — appears only on unlock */
  .bud-glow {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    opacity: 0;
    filter: blur(14px);
    transition: opacity 1.4s ease;
  }
  .bud-glow.l {
    width: 30%; height: 30%;
    left: 21%; top: 12%;
    background: radial-gradient(circle, var(--cream) 0%, transparent 70%);
  }
  .bud-glow.r {
    width: 30%; height: 30%;
    left: 49%; top: 12%;
    background: radial-gradient(circle, var(--coral) 0%, transparent 70%);
  }
  .artwork-wrap.unlocked .bud-glow { opacity: 0.45; animation: glowPulse 4s ease-in-out infinite; }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.32; }
    50% { opacity: 0.55; }
  }

  /* Track + album type block */
  .album-meta {
    margin-top: 22px;
    text-align: center;
    width: min(76vw, 360px);
  }
  .album-name {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.36em;
    color: var(--pearl);
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.85;
  }
  .locked-tag {
    font-size: 0.6rem;
    letter-spacing: 0.24em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 8px;
    transition: opacity 0.5s ease;
  }
  .locked-tag.hidden { opacity: 0; height: 0; margin: 0; pointer-events: none; }

  .album-name .sep {
    display: inline-block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--coral);
    margin: 0 0.7em;
    transform: translateY(-2px);
  }

  /* TITLE */
  .title-stage {
    margin: 6px 0 4px;
  }
  .title {
    font-size: 1.45rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream);
    line-height: 1;
    text-align: center;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .title.bloom {
    opacity: 1;
    transform: translateY(0);
  }

  .artist-line {
    margin-top: 14px;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Player */
  .player-wrap {
    width: min(76vw, 360px);
    margin-top: 22px;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.9s ease 0.6s, transform 0.9s ease 0.6s;
    min-height: 0;
  }
  .player-wrap.visible { opacity: 1; transform: translateY(0); }
  .now-playing-label {
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.28em;
    color: var(--pearl);
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
    opacity: 0.85;
  }
  .player-wrap iframe {
    width: 100%;
    border-radius: 8px;
    border: none;
    display: block;
    box-shadow: 0 0 0 1px rgba(164,214,201,0.18), 0 8px 28px rgba(0,0,0,0.55);
  }

  /* Pre-save */
  .presave-wrap {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s ease 1.6s, transform 0.8s ease 1.6s;
  }
  .presave-wrap.visible { opacity: 1; transform: translateY(0); }
  .presave-label {
    font-size: 0.55rem;
    letter-spacing: 0.26em;
    color: var(--pearl);
    text-transform: uppercase;
    opacity: 0.75;
  }
  .btn-presave {
    background: transparent;
    color: var(--cream);
    border: 1px solid var(--hairline);
    padding: 12px 28px;
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-presave:hover { background: rgba(242,234,184,0.06); border-color: var(--cream); }
  .grid-footer .live { color: var(--pearl); }

  /* CTA */
  .cta-wrap {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: min(76vw, 360px);
    transition: opacity 0.5s ease;
  }
  .cta-wrap.hidden {
    opacity: 0;
    pointer-events: none;
    height: 0;
    margin: 0;
    overflow: hidden;
  }
  .btn-locate {
    background: var(--coral);
    color: var(--cream);
    border: none;
    padding: 14px 30px;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    max-width: 280px;
  }
  .btn-locate:active { transform: scale(0.97); }
  .btn-locate:hover { background: #d04b40; }
  .btn-locate:disabled { background: #6b322d; cursor: default; }

  .status {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: var(--pearl);
    text-transform: uppercase;
    min-height: 16px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .status.show { opacity: 1; }

  .helper {
    font-size: 0.58rem;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    line-height: 1.7;
    max-width: 280px;
  }

  @keyframes scan { 0% { opacity: 0.35; } 50% { opacity: 1; } 100% { opacity: 0.35; } }
  .scanning { animation: scan 1.4s ease-in-out infinite; }

  .btn-dev {
    background: transparent;
    color: var(--vine);
    border: 1px dashed var(--vine);
    padding: 7px 18px;
    font-family: inherit;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 8px;
    opacity: 0.7;
  }

  /* Closed state (after Friday) */
  .closed-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: min(76vw, 360px);
    margin-top: 60px;
    text-align: center;
    gap: 18px;
  }
  .closed-state.show { display: flex; }
  .closed-mark {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--pearl);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
  }
  .closed-headline {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--cream);
    line-height: 1.4;
  }
  .closed-sub {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Mobile fit */
  @media (max-height: 820px) {
    .scene { padding-top: 18px; padding-bottom: 36px; }
    .artwork-wrap { width: min(58vw, 220px); }
    .album-name { font-size: 0.55rem; }
    .title { font-size: 1.25rem; }
    .player-wrap { margin-top: 14px; }
    .header-row { margin-bottom: 18px; }
  }
</style>
</head>
<body>

<img id="bgArt" src="album-cover.jpg" alt="">
<div class="pollen-layer" id="pollenLayer"></div>

<!-- ========== LOCKED VIEW ========== -->
<div class="view" id="lockedView">
  <div class="header-row">
    <span>Lane 8 + Friends · Cross Pollination II</span>
  </div>

  <div class="artwork-wrap" id="lockedArtworkWrap">
    <img class="artwork-img" src="album-cover.jpg" alt="Cross Pollination II">
  </div>

  <div class="album-meta">
    <div class="locked-tag">Awaiting your location</div>
    <div class="title-stage">
      <div class="title" id="lockedTitle"></div>
    </div>
  </div>

  <div class="cta-wrap" id="ctaWrap" style="margin-top: 32px;">
    <button class="btn-locate" id="btnLocate" onclick="checkLocation()">Find my location</button>
    <div class="status" id="status"></div>
    <button class="btn-dev" id="btnDev" onclick="devUnlock()" style="display:none">⚡ Dev unlock</button>
  </div>
</div>

<!-- ========== UNLOCKED VIEW ========== -->
<div class="view hidden" id="unlockedView">
  <div class="header-row">
    <span id="unlockedHeader">Lane 8 + Friends · Cross Pollination II</span>
  </div>

  <div class="artwork-wrap" id="artworkWrap">
    <img class="artwork-img" id="artwork" src="album-cover.jpg" alt="Cross Pollination II">
    <div id="mapOverlay"></div>
  </div>

  <div class="album-meta">
    <div class="title-stage">
      <div class="title unlocked" id="title"></div>
    </div>
  </div>

  <div class="player-wrap visible" id="playerWrap"></div>

  <div class="presave-wrap visible" id="presaveWrap">
    <a class="btn-presave" href="https://tnh.ffm.to/cpii" target="_blank" rel="noopener">Pre-save album</a>
  </div>

  <div class="grid-footer" style="margin-top:18px;opacity:0;transition:opacity 0.8s ease 2.6s;" id="liveWrap">
    <span class="live" id="liveCount">—</span>
  </div>
</div>

<!-- Closed state — after window ends -->
<div class="closed-state" id="closedState">
  <div class="closed-mark">×</div>
  <div class="closed-headline">The window has closed.</div>
  <div class="closed-sub">Cross Pollination II is out everywhere</div>
  <a class="btn-presave" href="https://tnh.ffm.to/cpii" target="_blank" rel="noopener" style="margin-top:8px">Listen on streaming</a>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CONFIG = {
  // Active window — Mon 9 Jun – Fri 13 Jun 2026, all day local-ish
  windowStart: new Date('2026-06-09T00:00:00'),
  windowEnd:   new Date('2026-06-13T23:59:59'),

  // Force-bypass the date check while developing
  bypassDateCheck: true,

  artist: 'Lane 8 + Friends',
  albumName: 'Cross Pollination II',

  // Default locked title — what shows before unlock
  lockedTitle: 'Cross Pollination II',

  // Track ↔ garden/zone map — source of truth: Notion "cross pollination II [geo unlocking]".
  // Each contributor unlocks at a botanical garden / park tied to them.
  // Coords + stream IDs synced from Notion 2026-06-02. tbc rows go live the moment lat/lng are set.
  tracks: [
    // Whole album plays as one continuous compact player (original feel). Set album:true to show the full scrollable tracklist instead.
    { id: 'denver',      title: 'Cross Pollination II', collaborators: '',               city: 'Washington Park · Denver',          lat: 39.7002,   lng: -104.9687, radius: 1000, stream: '9jMleBm7H7MS' },
    { id: 'capetown',    title: 'Sol',                  collaborators: 'Alan Green, Cornelius SA', city: 'Kirstenbosch · Cape Town',     lat: -33.98981, lng: 18.43200,  radius: 1000, stream: 'F0f9DHrdNRYu' },
    { id: 'montpellier', title: 'Pulsar',               collaborators: 'Teho',            city: 'Promenade du Peyrou · Montpellier', lat: 43.61194,  lng: 3.87722,   radius: 1000, stream: 'gmiLvYxxEQsj' },
    { id: 'pretoria',    title: 'Sol',                  collaborators: 'Cornelius SA, Alan Green', city: 'Pretoria Botanical Gardens',   lat: -25.73839, lng: 28.27217,  radius: 1000, stream: 'F0f9DHrdNRYu' },
    { id: 'brussels',    title: 'Candy',                collaborators: 'Quentin Quivera', city: 'Le Botanique · Brussels',           lat: 50.8547,   lng: 4.3653,    radius: 1000, stream: 'uZnH7jdQlIYL' },

    // ── Awaiting locations — set lat/lng to bring live ──────────────────────────────────
    { id: 'paris',   title: 'Purple Pepper',        collaborators: 'PARIS',       city: 'TBC',           lat: null, lng: null, radius: 1000, stream: 'BzQQjDcWj3AP' },
    { id: 'jyll',    title: 'The Doubt',            collaborators: 'Jyll, Gui Boratto', city: 'TBC',     lat: null, lng: null, radius: 1000, stream: 'Zmq0OgKcIi50' },
    { id: 'boratto', title: 'The Doubt',            collaborators: 'Gui Boratto, Jyll', city: 'TBC',     lat: null, lng: null, radius: 1000, stream: 'Zmq0OgKcIi50' },
    { id: 'grigore', title: 'Maglia Rosa',          collaborators: 'Grigoré',     city: 'TBC (Denver?)', lat: null, lng: null, radius: 1000, stream: 'IzA5AG5gxhc5' },
    { id: 'rae',     title: 'Something In The Air', collaborators: 'Rae Morris',  city: 'TBC',           lat: null, lng: null, radius: 1000, stream: '0MpQyhWSQ606' },
  ],

  // Untitled.stream embed builder — uniform dark styling across every track
  streamBase: 'https://untitled.stream/embed/',
};

function buildEmbed(streamId, tall){
  if (!streamId) return '';
  // tall = whole-album projects show their scrollable tracklist; singles stay compact
  var height = tall ? 344 : 180;
  // sandbox: allow the player's own scripts/streaming, but NO popups or top-nav,
  // so the embed's title/logo links can't navigate off to untitled.stream's public page.
  return '<iframe style="border-radius:8px; color-scheme: dark;" src="' + CONFIG.streamBase + streamId +
         '?theme=dark&bg=0d0a14&color=e55b4f" width="100%" height="' + height + '" allowFullScreen ' +
         'sandbox="allow-scripts allow-same-origin" ' +
         'allow="picture-in-picture" frameborder="0" loading="eager"></iframe>';
}
// ─────────────────────────────────────────────────────────────────────────────

// ── Date check ───────────────────────────────────────────────────────────────
(function checkWindow(){
  if (CONFIG.bypassDateCheck) return;
  const now = new Date();
  if (now < CONFIG.windowStart || now > CONFIG.windowEnd) {
    document.getElementById('lockedView').style.display = 'none';
    document.getElementById('unlockedView').style.display = 'none';
    document.getElementById('closedState').classList.add('show');
  }
})();

// Dev mode
if (new URLSearchParams(window.location.search).has('dev')) {
  document.getElementById('btnDev').style.display = 'block';
}

// AUTO-UNLOCK for preview — picks the first live garden
const _isPreview = new URLSearchParams(window.location.search).has('dev')
               || window.location.hostname === 'localhost'
               || window.location.hostname === '127.0.0.1'
               || window.location.hostname === ''
               || window.location.protocol === 'file:'
               || window.self !== window.top;
window.addEventListener('load', () => {
  if (!_isPreview) return;
  // ?preview=<id> forces a specific garden (e.g. ?preview=capetown). Otherwise first live garden.
  const want = new URLSearchParams(window.location.search).get('preview');
  setTimeout(() => {
    const t = (want && CONFIG.tracks.find(x => x.id === want))
           || CONFIG.tracks.find(x => x.lat != null)
           || CONFIG.tracks[0];
    unlockTrack(t);
  }, 600);
});

// ── Title bloom rendering ────────────────────────────────────────────────────
function renderTitle(text) {
  const el = document.getElementById('title');
  el.textContent = text.toUpperCase();
  el.classList.remove('bloom');
}
function bloomTitle() {
  setTimeout(() => document.getElementById('title').classList.add('bloom'), 50);
}

// Locked-view title — small row of buds
function renderLockedBuds() {
  // nothing — locked title area stays empty
}
renderLockedBuds();

// ===== Pollen drift layer =====
(function spawnPollen() {
  const layer = document.getElementById('pollenLayer');
  if (!layer) return;
  const palette = [
    'rgba(242,234,184,0.9)',  // cream
    'rgba(164,214,201,0.85)', // pearl
    'rgba(91,163,208,0.75)',  // sky
    'rgba(229,91,79,0.75)',   // coral
    'rgba(240,138,62,0.8)',   // sun
  ];
  const COUNT = 28;
  for (let i = 0; i < COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'pollen';
    const color = palette[Math.floor(Math.random() * palette.length)];
    const size = 3 + Math.random() * 6;
    const dur = 14 + Math.random() * 18;
    const delay = -Math.random() * dur;
    const left = Math.random() * 100;
    const mx = (Math.random() - 0.5) * 80;
    const ex = (Math.random() - 0.5) * 140;
    const peak = 0.35 + Math.random() * 0.45;
    p.style.left = left + 'vw';
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = color;
    p.style.boxShadow = '0 0 ' + (size * 1.6) + 'px ' + color;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = delay + 's';
    p.style.setProperty('--mx', mx + 'px');
    p.style.setProperty('--ex', ex + 'px');
    p.style.setProperty('--peak', peak);
    layer.appendChild(p);
  }
})();

// ── Geo ──────────────────────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function setStatus(msg, show = true) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('show', show);
}

let _watchId = null;
let _isUnlocked = false;
let _activeTrack = null;

function startWatching() {
  if (!navigator.geolocation || _watchId !== null || !_activeTrack) return;
  _watchId = navigator.geolocation.watchPosition(
    (pos) => {
      if (!_isUnlocked) return;
      const { latitude: lat, longitude: lng } = pos.coords;
      const dist = haversine(lat, lng, _activeTrack.lat, _activeTrack.lng);
      if (dist > _activeTrack.radius) revoke();
    },
    null,
    { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 }
  );
}

function revoke() {
  _isUnlocked = false;
  _activeTrack = null;

  // Hide map overlay
  document.getElementById('mapOverlay').classList.remove('visible');
  document.getElementById('bgArt').classList.remove('visible');
  document.getElementById('title').classList.remove('bloom');

  // Swap back to locked view
  document.getElementById('unlockedView').classList.add('hidden');
  document.getElementById('lockedView').classList.remove('hidden');

  document.getElementById('playerWrap').innerHTML = '';
  document.getElementById('unlockedHeader').textContent = 'Lane 8 + Friends · Cross Pollination II';

  renderLockedBuds();

  const btn = document.getElementById('btnLocate');
  btn.disabled = false;
  btn.textContent = 'Find my location';
  setStatus('', false);
}

function unlockTrack(track) {
  _activeTrack = track;
  _isUnlocked = true;

  // Transition between views
  const lockedView = document.getElementById('lockedView');
  const unlockedView = document.getElementById('unlockedView');

  lockedView.classList.add('hidden');
  unlockedView.classList.remove('hidden');
  document.getElementById('bgArt').classList.add('visible');
  unlockedView.classList.add('entering');
  // force reflow then animate in
  void unlockedView.offsetWidth;
  unlockedView.classList.remove('entering');

  // Render title and bloom in
  renderTitle(track.title);
  setTimeout(() => bloomTitle(), 800);

  // Init Leaflet map over the artwork
  if (!window._map) {
    window._map = L.map('mapOverlay', {
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      tap: false,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 18,
    }).addTo(window._map);
  }

  window._map.setView([track.lat || 39.7002, track.lng || -104.9687], 13);
  window._map.invalidateSize();

  setTimeout(() => {
    window._map.flyTo([track.lat || 39.7002, track.lng || -104.9687], 15, {
      duration: 4,
      easeLinearity: 0.4,
    });
    if (window._marker) window._marker.remove();
    window._marker = L.circleMarker([track.lat || 39.7002, track.lng || -104.9687], {
      radius: 7,
      fillColor: '#E55B4F',
      color: '#F2EAB8',
      weight: 2,
      fillOpacity: 1,
      className: 'location-pin'
    }).addTo(window._map);
    document.getElementById('mapOverlay').classList.add('visible');
  }, 600);

  // Top header becomes the specific artist credit (local artist first)
  document.getElementById('unlockedHeader').textContent =
    track.collaborators ? 'Lane 8, ' + track.collaborators : 'Lane 8';

  // Inject player
  const playerWrap = document.getElementById('playerWrap');
  playerWrap.innerHTML = buildEmbed(track.stream, track.album);

  // Watch
  startWatching();
  if (!_isPreview) {
    document.addEventListener('visibilitychange', () => {
      if (_isUnlocked && document.hidden) revoke();
    }, { once: true });
  }

  setStatus('');
}

function devUnlock() {
  // Preview the first live garden (one with real coords), fallback to first track
  const t = CONFIG.tracks.find(x => x.lat != null) || CONFIG.tracks[0];
  unlockTrack(t);
}

function checkLocation() {
  const btn = document.getElementById('btnLocate');

  // Testing override: ?at=LAT,LNG simulates standing at those coords (desktop has no GPS).
  // e.g. ?at=39.7002,-104.9687 → Denver. Runs the real geofence match + unlock.
  const at = new URLSearchParams(window.location.search).get('at');
  if (at && /^-?\d+(\.\d+)?,-?\d+(\.\d+)?$/.test(at.trim())) {
    const [flat, flng] = at.trim().split(',').map(Number);
    onLocationFix(flat, flng);
    return;
  }

  if (!navigator.geolocation) {
    setStatus('Geolocation not supported on this device.');
    return;
  }
  btn.disabled = true;
  btn.classList.add('scanning');
  btn.textContent = 'Locating…';
  setStatus('Finding you…', true);

  // Shared matcher — hoisted so the ?at= override (above) can call it too.
  function onLocationFix(lat, lng) {
    btn.classList.remove('scanning');
    for (const t of CONFIG.tracks) {
      if (t.lat == null) continue;
      const dist = haversine(lat, lng, t.lat, t.lng);
      if (dist <= t.radius) {
        unlockTrack(t);
        return;
      }
    }
    btn.disabled = false;
    btn.textContent = 'Find my location';
    setStatus('Not there yet. Find the right place.');
  }

  const onSuccess = (pos) => onLocationFix(pos.coords.latitude, pos.coords.longitude);

  const onError = (err) => {
    btn.classList.remove('scanning');
    btn.disabled = false;
    btn.textContent = 'Find my location';
    const msgs = {
      1: 'Location access denied. Enable it in your browser settings.',
      2: 'Position unavailable. Move somewhere with a clearer signal.',
      3: 'Couldn’t pin you down in time. Try again — ideally outdoors.',
    };
    setStatus(msgs[err.code] || 'Something went wrong. Try again.');
  };

  // Stage 1: fast, high-accuracy (GPS). If it times out or is unavailable,
  // fall back to low-accuracy (Wi-Fi/IP) with a longer window before erroring.
  navigator.geolocation.getCurrentPosition(
    onSuccess,
    (err) => {
      if (err.code === 3 || err.code === 2) {
        setStatus('Still finding you…', true);
        navigator.geolocation.getCurrentPosition(
          onSuccess, onError,
          { enableHighAccuracy: false, timeout: 25000, maximumAge: 60000 }
        );
      } else {
        onError(err);
      }
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}
</script>
